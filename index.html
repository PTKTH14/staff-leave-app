<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1b2a4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ระบบลา">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ระบบลาเจ้าหน้าที่</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <style>
    :root { --navy:#1b2a4a; --gold:#b88a2c; --paper:#f7f6f1; --line:#ddd8ca; --text:#17223b; }
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; margin:0; overflow:hidden; background:var(--paper); color:var(--text); font-family:Tahoma,"Noto Sans Thai",Arial,sans-serif; }
    body { padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
    .app { height:100%; }
    button,a.button { min-height:39px; padding:7px 12px; border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--navy); font:700 14px Tahoma,Arial,sans-serif; text-decoration:none; cursor:pointer; align-items:center; justify-content:center; }
    button { display:none; }
    button.visible,a.button { display:inline-flex; }
    button.primary { background:var(--navy); border-color:var(--navy); color:#fff; }
    .stage { min-height:100%; display:grid; place-items:center; padding:24px; background:var(--paper); text-align:center; }
    .launch { width:min(100%,440px); }
    .launch img { width:92px; height:92px; border-radius:18px; margin-bottom:18px; box-shadow:0 8px 20px rgba(23,34,59,.16); }
    .launch h1 { margin:0 0 8px; font-size:22px; }
    .launch p { margin:0 auto 22px; max-width:360px; color:#5e687b; font-size:15px; line-height:1.7; }
    .launch .open-system { display:inline-flex; min-height:46px; min-width:210px; padding:10px 18px; border:1px solid var(--navy); border-radius:6px; background:var(--navy); color:#fff; font:700 16px Tahoma,Arial,sans-serif; text-decoration:none; align-items:center; justify-content:center; }
    .launch .minor-actions { display:flex; justify-content:center; gap:8px; margin-top:14px; }
    .tip { display:none; position:fixed; left:12px; right:12px; bottom:max(12px,env(safe-area-inset-bottom)); z-index:8; padding:14px 44px 14px 15px; background:#fff; border:1px solid var(--line); border-radius:6px; box-shadow:0 8px 28px rgba(23,34,59,.24); font-size:14px; line-height:1.65; }
    .tip.show { display:block; }
    .tip .close { display:block; position:absolute; top:5px; right:5px; width:34px; min-height:34px; padding:0; border:0; font-size:21px; }
    @media (display-mode:standalone) { #installHelp { display:none; } }
    @media (max-width:600px) {
      button,a.button { min-width:40px; padding:6px 9px; }
      .label-wide { display:none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage">
      <div class="launch">
        <img src="./icons/icon-192.png" alt="">
        <h1>ระบบลาเจ้าหน้าที่</h1>
        <p>กดปุ่มด้านล่างเพื่อเข้าใช้งานระบบลา</p>
        <a class="open-system" href="https://script.google.com/macros/s/AKfycbwVwd_dU7hjJ_SqZxnYh7hwfuWDhRfF0hpg4MSUM_-T1O1IhtoE8yCjY3Vc5iecJZJJPg/exec">เปิดระบบลา</a>
        <div class="minor-actions">
          <button id="installButton" class="primary" type="button">ติดตั้งแอป</button>
          <button id="installHelp" class="visible" type="button">วิธีติดตั้ง</button>
        </div>
      </div>
    </section>
  </main>

  <aside id="installTip" class="tip" role="dialog" aria-label="วิธีติดตั้งแอป">
    <button id="closeTip" class="close" type="button" aria-label="ปิด">×</button>
    <strong>iPhone / iPad</strong>: เปิดหน้านี้ด้วย Safari กดปุ่มแชร์ แล้วเลือก “เพิ่มไปยังหน้าจอโฮม”<br>
    <strong>Android</strong>: เปิดด้วย Chrome กดเมนู แล้วเลือก “ติดตั้งแอป” หรือ “เพิ่มลงในหน้าจอหลัก”
  </aside>

  <script>
    const tip = document.getElementById('installTip');
    const installButton = document.getElementById('installButton');
    let installPrompt = null;

    document.getElementById('installHelp').addEventListener('click', () => tip.classList.add('show'));
    document.getElementById('closeTip').addEventListener('click', () => tip.classList.remove('show'));

    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      installPrompt = event;
      installButton.classList.add('visible');
    });

    installButton.addEventListener('click', async () => {
      if (!installPrompt) { tip.classList.add('show'); return; }
      installPrompt.prompt();
      await installPrompt.userChoice;
      installPrompt = null;
      installButton.classList.remove('visible');
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
